const KICKOFF = new Date('2026-06-12T03:00:00+08:00');

// ============ DYNAMIC DATA LOADING ============
let LIVE_DATA = null;
let DATA_SOURCE = '内置预估数据';
let DATA_UPDATED = '2026-06-06 (发布日)';

async function loadLiveData() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    if (resp.ok) {
      LIVE_DATA = await resp.json();
      DATA_SOURCE = LIVE_DATA.source || '竞彩网+AI分析';
      DATA_UPDATED = LIVE_DATA.updated || '未知';
      console.log('✅ 实时数据加载成功:', DATA_UPDATED);
    }
  } catch(e) {
    console.log('⚠️ 使用内置预估数据 (data.json 未加载)');
    LIVE_DATA = null;
  }
  updateFreshness();
}

function updateFreshness() {
  const el = document.getElementById('freshnessText');
  const now = new Date();
  let updateDate;
  try { updateDate = new Date(DATA_UPDATED); } catch(e) { updateDate = now; }
  const hoursAgo = Math.floor((now - updateDate) / 3600000);

  let status, color;
  if (LIVE_DATA && hoursAgo < 6) {
    status = `🟢 实时数据 | 更新于 ${DATA_UPDATED} | 来源: ${DATA_SOURCE}`;
    color = '#00d4aa';
  } else if (LIVE_DATA && hoursAgo < 24) {
    status = `🟡 今日数据 | 更新于 ${DATA_UPDATED} (${hoursAgo}小时前) | 来源: ${DATA_SOURCE}`;
    color = '#f5c542';
  } else if (LIVE_DATA) {
    status = `🟠 数据已过时 | 更新于 ${DATA_UPDATED} (${hoursAgo}小时前) | 建议刷新`;
    color = '#e67e22';
  } else {
    status = `🔴 离线模式 | 数据为发布日预估 | 每日8:57自动更新`;
    color = '#ff4757';
    DATA_UPDATED = '2026-06-06 (发布日静态数据)';
  }
  el.innerHTML = status;
  el.style.color = color;
}

function mergeLiveData() {
  if (!LIVE_DATA || !LIVE_DATA.matches) return;
  for (const live of LIVE_DATA.matches) {
    const m = MATCHES.find(x => x.id === live.id);
    if (!m) continue;
    if (live.spf) m.odds.spf = live.spf;
    if (live.tip) m.odds.tip = live.tip;
    if (live.level) m.odds.level = live.level;
    if (live.totalGoals) m.odds.totalGoals = live.totalGoals;
    if (live.htft) m.odds.htft = live.htft;
    if (live.score) m.odds.score = live.score;
    if (live.injury) m.injury = live.injury;
    if (live.news) m.news = live.news;
  }
}

// ============ HELPERS ============
function flag(team) { return FLAGS[team] || (/^[A-Z]组/.test(team) ? '🏟️' : /胜者|负者/.test(team) ? '⚽' : '🏳️'); }
function groupColor(g) { return GROUPS[g]?.color || '#888'; }

function formatDate(d) {
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  const dt = new Date(d + 'T00:00:00+08:00');
  return `${d} ${days[dt.getDay()]}`;
}

// ============ COUNTDOWN ============
function updateCountdown() {
  const now = new Date();
  const diff = KICKOFF - now;
  if (diff <= 0) {
    document.getElementById('countdown').innerHTML = '<div class="cd-item"><div class="num">🏟️</div><div class="label">世界杯已开赛！</div></div>';
    return;
  }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('countdown').innerHTML = `
    <div class="cd-item"><div class="num">${d}</div><div class="label">天</div></div>
    <div class="cd-item"><div class="num">${String(h).padStart(2,'0')}</div><div class="label">时</div></div>
    <div class="cd-item"><div class="num">${String(m).padStart(2,'0')}</div><div class="label">分</div></div>
    <div class="cd-item"><div class="num">${String(s).padStart(2,'0')}</div><div class="label">秒</div></div>
  `;
}
setInterval(updateCountdown, 1000);
updateCountdown();

let currentView = 'schedule';

let groupFilter = 'all';
let teamFilter = '';

function getFilteredMatches() {
  return MATCHES.filter(m => {
    if (dateFilter !== 'all' && m.date !== dateFilter) return false;
    if (groupFilter !== 'all' && m.group !== groupFilter) return false;
    if (teamFilter && !m.home.includes(teamFilter) && !m.away.includes(teamFilter)) return false;
    return true;
  });
}

function renderSchedule() {
  const matches = getFilteredMatches();
  if (matches.length === 0) return '<div style="text-align:center;padding:40px;color:var(--muted)">没有匹配的比赛</div>';

  let html = '';
  let lastDate = '';
  const today = new Date().toISOString().slice(0,10);

  for (const m of matches) {
    if (m.date !== lastDate) {
      const isToday = m.date === today;
      html += `<div class="date-header">
        ${formatDate(m.date)} ${isToday ? '🔴 今天' : ''}
        <span class="round-badge">${ROUND_NAMES[m.round] || '第'+m.round+'轮'}</span>
      </div>`;
      lastDate = m.date;
    }
    const isFocus = m.focus ? ' with-odds' : '';
    html += `<div class="match-card${isFocus}" onclick="showMatch(${m.id})" data-match-id="${m.id}">
      <div class="m-group" style="background:${groupColor(m.group)}">${m.group}</div>

      <div class="vs"><div style="font-size:1em">VS</div><div class="m-time">${m.time}</div></div>

        <span>📊 ${m.odds.level||''}</span>

      <div class="venue">📍 ${m.venue}</div>
    </div>`;
  }
  return html;
}

function showMatch(id) {
  const m = MATCHES.find(x => x.id === id);
  if (!m) return;
  const tips = {
    '胜':'主队赢球', '平':'双方打平', '负':'客队赢球'
  };
  // Smart defaults: compute from level+tip when data.json hasn't loaded per-match data
  const isStrong = (m.odds?.level||'').includes('铁胆') || (m.odds?.level||'').includes('稳胆');
  const isHomeWin = m.odds?.tip === '胜', isAwayWin = m.odds?.tip === '负';
  const tg = m.odds?.totalGoals || (isStrong ? '2球/3球' : '1球/2球');
  const hf = m.odds?.htft || (isHomeWin ? '胜-胜/平-胜' : isAwayWin ? '负-负/平-负' : '平-平/胜-平');
  const sc = m.odds?.score || (isHomeWin && isStrong ? '2:0/3:0' : isAwayWin && isStrong ? '0:2/0:3' : isHomeWin ? '1:0/2:1' : isAwayWin ? '0:1/1:2' : '1:1/0:0');
  document.getElementById('modalContent').innerHTML = `
    <h2>${flag(m.home)} ${m.home} VS ${m.away} ${flag(m.away)}</h2>
    <div class="m-detail">📅 ${formatDate(m.date)} ${m.time} 北京时间</div>
    <div class="m-detail">🏟️ ${m.venue}</div>
    <div class="m-detail">📊 ${GROUPS[m.group]?.name||'淘汰赛'} · ${ROUND_NAMES[m.round]||'第'+m.round+'轮'} ${m.focus||''}</div>
    ${m.injury ? `<div class="m-detail" style="color:var(--danger)">⚠️ ${m.injury}</div>` : ''}
    <div class="prediction">
      <h4>🤖 AI推荐</h4>
      <div class="bet-row"><span>推荐结果</span><span style="color:var(--accent);font-weight:700">${m.odds?.tip||'—'} ${tips[m.odds?.tip]||''}</span></div>
      <div class="bet-row"><span>胜平负SPF</span><span>${m.odds?.spf||'待开售'}</span></div>
      <div class="bet-row"><span>信心等级</span><span>${m.odds?.level||'—'}</span></div>
      <div class="bet-row"><span>总进球推荐</span><span>${tg}</span></div>
      <div class="bet-row"><span>半全场推荐</span><span>${hf}</span></div>
      <div class="bet-row"><span>比分推荐</span><span>${sc}</span></div>
      <p style="font-size:0.75em;color:var(--muted);margin-top:8px">⚠️ 赔率为国际盘口换算预估，实际以竞彩出票为准</p>
    </div>
    <button class="close" onclick="closeModal()">关闭</button>
  `;
  document.getElementById('modal').style.display = 'flex';
}

// ============ MAIN RENDER ============
function render(view) {
  currentView = view;
  let html = '';

  if (view === 'schedule') {
    // Filters
    const dates = [...new Set(MATCHES.map(m => m.date))];
    html += `<div class="filters">
      <select id="dateFilter" onchange="dateFilter=this.value;render(currentView)">
        <option value="all">📅 全部日期</option>
        ${dates.map(d => `<option value="${d}">${formatDate(d)}</option>`).join('')}
      </select>
      <select id="groupFilter" onchange="groupFilter=this.value;render(currentView)">
        <option value="all">📊 全部小组</option>
        ${Object.entries(GROUPS).map(([k,v]) => `<option value="${k}">${v.name}</option>`).join('')}
      </select>
      <input id="teamFilter" type="text" placeholder="🔍 搜索球队..." oninput="teamFilter=this.value;render(currentView)">
      <button class="ai-badge" onclick="render('analysis')">🤖 AI分析</button>
    </div>`;
    html += '<div class="match-list">' + renderSchedule() + '</div>';
  } else if (view === 'today') {
    html += renderToday();
  } else if (view === 'groups') {
    html += renderGroups();
  } else if (view === 'focus') {
    html += '<h3 style="margin-bottom:12px">⭐ 本届世界杯10大必看焦点战</h3>' + renderFocus();
  } else if (view === 'analysis') {
    html += renderAnalysis();
  }

  document.getElementById('mainContent').innerHTML = html;

  // Set filter values back after re-render
  if (view === 'schedule') {
    const df = document.getElementById('dateFilter');
    const gf = document.getElementById('groupFilter');
    const tf = document.getElementById('teamFilter');
    if (df) df.value = dateFilter;
    if (gf) gf.value = groupFilter;
    if (tf) tf.value = teamFilter;
  }
}

    document.querySelectorAll('#navTabs button').forEach(b => b.classList.remove('active'));

    render(e.target.dataset.view);
  }
});

// Init (data loads async, then renders)
(async function init() {
  await loadLiveData();
  mergeLiveData();
  updateFreshness();
  render('schedule');
})();
</script>
